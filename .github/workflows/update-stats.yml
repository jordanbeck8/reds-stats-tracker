name: Update Reds Stats

on:
  schedule:
    # Runs daily at 8:00 AM ET (13:00 UTC) — after overnight data refresh
    - cron: "0 13 * * *"
  workflow_dispatch:  # Allow manual trigger from GitHub UI

# RST-002: Least-privilege — default read-only; write elevated per-job only
permissions:
  contents: read

jobs:
  update:
    runs-on: ubuntu-24.04  # RST-005: pin to specific LTS runner (was ubuntu-latest)
    # RST-002: contents: write scoped to this job only (commit/push step needs it)
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        # RST-001: pinned to immutable commit SHA (was @v4)
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Set up Python
        # RST-001: pinned to immutable commit SHA (was @v5)
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch stats and update README
        run: python fetch_stats.py

      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md bwar_cache.json
          if git diff --cached --quiet; then
            echo "No changes to README.md — skipping commit."
          else
            git commit -m "chore: update Reds stats [$(date -u +'%Y-%m-%d')]"
            git push
          fi
