name: Update Reds Stats (manual fallback)

# Scheduled updates moved to supernova (systemd timers: nightly 00:05 ET +
# post-game runs at first pitch +3h). This workflow is break-glass only.
# Note: Baseball-Reference and FanGraphs may block GitHub's IPs — WAR falls
# back to the committed caches in data/caches/.
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Fetch stats and update snapshots + README
        run: uv run python -m pipeline.run

      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md data
          if git diff --cached --quiet; then
            echo "No changes — skipping commit."
          else
            git commit -m "chore: update Reds stats [$(date -u +'%Y-%m-%d')]"
            git push
          fi
